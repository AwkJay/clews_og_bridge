name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn python-multipart pandas pydantic PyYAML jsonschema click typing_extensions pytest httpx
      - name: Install package
        run: pip install -e .
      - name: Run existing tests
        run: pytest tests/ -v
      - name: Smoke test API startup
        run: |
          uvicorn main:app --port 8765 &
          sleep 3
          curl -f http://localhost:8765/health || exit 1
